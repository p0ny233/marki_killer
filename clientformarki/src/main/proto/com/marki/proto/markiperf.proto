syntax="proto3";

package com.marki.proto;

message PhotoMessage{
  bytes data = 1;                     // 图片bytes array
  string fileMd5 = 2;
  uint32 fileSize=3;
}

message TimeMessage{
  int64 timestamp=1;
}

message MarkiMessage{
  // 指令类型 修改时间还是修改图片, 或者两者 都修改
  PhotoMessage photo=2;
  TimeMessage timeMessage=3;
}